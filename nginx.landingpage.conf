# nginx config for landingpage-3.0 (Vue CLI SPA)
# This container is internal-only — nuxt-landing-page proxies to it via
# BSRE_PROXY_TARGET. The bsre-page-proxy.ts middleware already decides which
# paths to forward here, so nginx only needs to serve the SPA and its assets.

user  nginx;
worker_processes  auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main "$remote_addr - $remote_user [$time_local] '$request' "
                  "$status $body_bytes_sent '$http_referer' '$http_user_agent'";
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  server {
    listen 80;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Survey API requests use the main landing gateway, which owns APP_SURVEY.
    # Keep both prefixes for compatibility with current and legacy clients.
    location ^~ /_survey/ {
      proxy_pass         http://landing:80;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /api/_survey/ {
      proxy_pass         http://landing:80;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback — all other paths return index.html
    location / {
      try_files $uri $uri/ /index.html;
    }

    error_page 403 404 /index.html;
  }
}
