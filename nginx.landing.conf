# nginx config for nuxt-landing-page (static SPA — main entry point)
# Proxies sub-paths to internal services via docker-compose network.

user  nginx;
worker_processes  auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main "$remote_addr - $remote_user [$time_local] '$request' "
                  "$status $body_bytes_sent '$http_referer' '$http_user_agent'";
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 10M;
  server_tokens off;

  server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # ── /helpdesk → helpdesk-nuxt service ──────────────────────────────
    # ^~ blocks regex matching so /helpdesk/_nuxt/... assets are proxied here
    # instead of being caught by the static asset ~* regex block below.
    location ^~ /helpdesk {
      proxy_pass         http://helpdesk:80/helpdesk;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── /reservation → reservation-nuxt service ─────────────────────────
    # ^~ blocks regex matching so /reservation/_nuxt/... assets are proxied here
    # instead of being caught by the static asset ~* regex block below.
    location ^~ /reservation {
      proxy_pass         http://reservation:80/reservation;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── landingpage-3.0 page routes (matches bsre-page-proxy.ts patterns) ──
    # These paths are served by the internal landingpage Vue SPA.
    location ~* ^/(tiket/survey|kegiatan|registrasi-kerjasama|kerjasama|email|bsre)/ {
      proxy_pass         http://landingpage:80;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }

    # ── landingpage-3.0 runtime assets ─────────────────────────────────
    location ~* ^/(css|js|img|dist)/ {
      proxy_pass         http://landingpage:80;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # ── Static assets (nuxt-landing-page own assets) ────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # ── SPA fallback ────────────────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }

    error_page 403 404 /index.html;
  }
}
