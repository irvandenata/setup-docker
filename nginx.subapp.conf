# nginx config for helpdesk-nuxt and reservation-nuxt (static SPA at sub-path)
# Used by both Dockerfile.helpdesk and Dockerfile.reservation.
#
# The upstream landing-nginx proxy_pass forwards the full prefixed path:
#   GET /reservation/instansi → http://reservation:80/reservation/instansi
#   GET /reservation/_nuxt/file.js → http://reservation:80/reservation/_nuxt/file.js
#
# The Nuxt static output lives flat under /usr/share/nginx/html/ (no
# /reservation/ subdirectory). We use `rewrite` to strip the prefix before
# nginx resolves the file.
#
# absolute_redirect off prevents nginx from issuing 301s to http://hostname/path/
# when it finds a directory (e.g. /instansi/) — instead try_files falls through
# to the index.html SPA fallback.

user  nginx;
worker_processes  auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main "$remote_addr - $remote_user [$time_local] '$request' "
                  "$status $body_bytes_sent '$http_referer' '$http_user_agent'";
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  keepalive_timeout 65;
  client_max_body_size 10M;
  server_tokens off;

  server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from issuing absolute 301 redirects when a directory is
    # found by try_files — keeps SPA sub-routes working without redirect loops.
    absolute_redirect off;

    # Strip /reservation or /helpdesk prefix then re-evaluate the URI.
    # Handles all forms: /reservation, /reservation/, /reservation/path.
    location ~ ^/(reservation|helpdesk)(/.+)$ {
      rewrite ^/(reservation|helpdesk)(/.+)$ $2 last;
    }
    location ~ ^/(reservation|helpdesk)/?$ {
      rewrite ^ / last;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|json|map|txt|xml)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # SPA fallback — serve index.html for all non-file routes.
    # We check $uri (exact file) and $uri/index.html (pre-rendered page) before
    # falling back to the root index.html. Skipping $uri/ avoids the nginx
    # behaviour of 301-redirecting bare directory paths to path/ (e.g. /instansi
    # → 301 /instansi/) which breaks SPA sub-route navigation.
    location / {
      try_files $uri $uri/index.html /index.html;
    }

    error_page 403 404 /index.html;
  }
}
